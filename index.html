<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
    <title>Library</title>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>Library</h1>
        </div>
        <div class="add-book">
            <h2>Add New Book</h2>
            <form id="addBookForm">
                <input type="text" id="title" placeholder="Title" required>
                <input type="text" id="author" placeholder="Author" required>
                <input type="number" id="pages" placeholder="Pages" required>
                <input type="radio" id="read" name="readStatus" value="read">
                <label for="read">Read</label>
                <input type="radio" id="notRead" name="readStatus" value="notRead">
                <label for="notRead">Not Read</label>
                <button type="submit">Add Book</button>
            </form>
        </div>
        <div class="display-books">
            <h2>Book List</h2>
            <div id="bookList"></div>
        </div>
    </div>
</body>
</html>
